<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" id="clippy-svg">
    <!-- Paperclip Body -->
    <path id="paperclip-body" d="M100,50 C130,50 150,70 150,100 C150,130 130,150 100,150 C70,150 50,130 50,100 C50,70 70,50 100,50 Z" 
          fill="url(#paperclip-gradient)" stroke="#333" stroke-width="2"/>
    
    <!-- Paperclip Inner Curve -->
    <path id="paperclip-inner" d="M100,70 C120,70 130,80 130,100 C130,120 120,130 100,130 C80,130 70,120 70,100 C70,80 80,70 100,70 Z" 
          fill="none" stroke="#666" stroke-width="1.5" stroke-dasharray="3,2"/>
    
    <!-- Eyes -->
    <circle id="left-eye" cx="85" cy="90" r="8" fill="white" stroke="#333" stroke-width="2"/>
    <circle id="right-eye" cx="115" cy="90" r="8" fill="white" stroke="#333" stroke-width="2"/>
    <circle id="left-pupil" cx="85" cy="90" r="4" fill="#333"/>
    <circle id="right-pupil" cx="115" cy="90" r="4" fill="#333"/>
    
    <!-- Eye Highlights -->
    <circle cx="83" cy="88" r="2" fill="white"/>
    <circle cx="113" cy="88" r="2" fill="white"/>
    
    <!-- Smile -->
    <path id="smile" d="M85,110 Q100,125 115,110" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Thinking Bubble (hidden by default) -->
    <g id="thinking-bubble" opacity="0">
        <circle cx="160" cy="60" r="20" fill="white" stroke="#333" stroke-width="2"/>
        <path d="M150,80 Q140,90 130,85" fill="none" stroke="#333" stroke-width="2"/>
        <text x="160" y="65" text-anchor="middle" font-family="Arial" font-size="12" fill="#333">?</text>
    </g>
    
    <!-- Help Bubble (hidden by default) -->
    <g id="help-bubble" opacity="0">
        <rect x="160" y="30" width="120" height="60" rx="10" ry="10" fill="white" stroke="#333" stroke-width="2"/>
        <path d="M180,90 Q170,100 160,95" fill="none" stroke="#333" stroke-width="2"/>
        <text x="220" y="50" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Need help?</text>
        <text x="220" y="65" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Click me!</text>
    </g>
    
    <!-- Pointing Arm (hidden by default) -->
    <path id="pointing-arm" d="M130,120 Q145,130 160,140" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" opacity="0"/>
    
    <!-- Gradients -->
    <defs>
        <linearGradient id="paperclip-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C0C0C0"/>
            <stop offset="50%" stop-color="#E0E0E0"/>
            <stop offset="100%" stop-color="#C0C0C0"/>
        </linearGradient>
    </defs>
</svg>