<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clippy Theme Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.min.css">
    <link rel="stylesheet" href="css/clippy.css">
</head>
<body>
    <div class="container">
        <h1>Clippy Theme Test</h1>
        
        <div class="hero">
            <h2>Office 97/2000 Style Components</h2>
            <p>Testing the Clippy theme with Office-style components.</p>
            
            <div class="hero-cta">
                <button class="btn btn-primary">Primary Button</button>
                <button class="btn btn-secondary">Secondary Button</button>
                <button class="btn btn-help">Help Button</button>
            </div>
        </div>
        
        <div class="value-grid">
            <div class="value-card">
                <div class="value-icon">🧠</div>
                <h3 class="value-title">Intelligence Built-In</h3>
                <p class="value-desc">We don't just add AI features—we build with AI from the ground up.</p>
            </div>
            <div class="value-card">
                <div class="value-icon">⚡</div>
                <h3 class="value-title">Rapid Innovation</h3>
                <p class="value-desc">Leverage our AI-powered development process.</p>
            </div>
        </div>
        
        <div class="form-group">
            <label for="test-input">Test Input</label>
            <input type="text" id="test-input" placeholder="Type something...">
        </div>
        
        <div class="form-group">
            <label for="test-textarea">Test Textarea</label>
            <textarea id="test-textarea" placeholder="Write something..."></textarea>
        </div>
    </div>
    
    <script src="js/clippy.js"></script>
</body>
</html>
